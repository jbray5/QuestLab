    <circle cx="808" cy="708" r="18" fill="#2c5440"/>
    <circle cx="836" cy="688" r="20" fill="#234634"/>
    <circle cx="876" cy="676" r="17" fill="#356046"/>
    <circle cx="900" cy="708" r="19" fill="#2c5440"/>
