  <!-- ============ THE PALE'S WOODED SKIRTS & MISTWOOD ENCROACHMENT ============ -->
  <!-- The Pale's flanks are wooded; the Mistwood comes down the slopes and
       reaches the Green's north edge. Battle-map reconciliation: this is the
       tree-line the corrupted fey emerge from in 'Hold the Hearth'. -->
  <g fill-opacity="0.95">
    <!-- wooded southern slope of the Pale (between bare crown and the Green) -->
    <circle cx="328" cy="478" r="18" fill="#2c5440"/>
    <circle cx="378" cy="528" r="20" fill="#234634"/>
    <circle cx="416" cy="572" r="17" fill="#356046"/>
