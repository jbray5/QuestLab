<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- QuestLab d20 favicon — gold stroke on a dark hex disc. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a221a" />
      <stop offset="100%" stop-color="#0f0a05" />
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4d068" />
      <stop offset="60%" stop-color="#d6af36" />
      <stop offset="100%" stop-color="#9d7c1f" />
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#gold)" stroke-width="2.5"/>
  <!-- d20 silhouette (hex with internal facets) -->
  <g fill="none" stroke="url(#gold)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <polygon points="32,8 56,22 56,42 32,56 8,42 8,22"/>
    <polyline points="32,8 32,32 56,42"/>
    <polyline points="32,32 8,42"/>
    <polyline points="32,32 32,56"/>
    <polyline points="8,22 32,32 56,22"/>
  </g>
  <!-- "20" centered, small -->
  <text x="32" y="38" text-anchor="middle"
        font-family="Georgia, serif" font-weight="700" font-size="14"
        fill="url(#gold)">20</text>
</svg>
