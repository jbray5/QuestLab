name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: black — format check
        run: black --check --line-length 100 .

      # No flags: pyproject.toml [tool.isort] is the single config source, and the
      # version is pinned in requirements.txt (flags here once shadowed pyproject
      # while the version floated — that combination red-lined main, Jul 2026).
      - name: isort — import order check
        run: isort --check-only .

      - name: flake8 — lint
        run: flake8 --max-line-length 100 .

      - name: interrogate — docstring coverage
        run: interrogate -c pyproject.toml .

      - name: pip-audit — vulnerability scan
        # PYSEC-2022-42969: py 1.11.0 ReDoS — transitive dep of interrogate;
        # no fix available (py package unmaintained). Tracked in QUALITY.md TD-004.
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969

      - name: pytest — test suite
        env:
          ENV: development
          DB_BACKEND: duckdb
          DUCKDB_PATH: ":memory:"
          CURRENT_USER_EMAIL: ci@questlab.test
          AUTH_EMAIL_HEADER: X-MS-CLIENT-PRINCIPAL-NAME
          BOOTSTRAP_ADMIN_EMAILS: ci@questlab.test
          LOG_LEVEL: WARNING
        run: pytest -q --tb=short

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Hard gate: tsc -b && vite build. A type error here is exactly what used
      # to sail through green CI and fail only as a Vercel production deploy.
      - name: Build (tsc + vite)
        run: npm run build

      # eslint has a backlog of ~20 pre-existing errors in legacy components
      # (set-state-in-effect, purity). The crash-class rules-of-hooks bug is
      # fixed. Informational until the backlog is cleared, then drop
      # continue-on-error to make it a hard gate. Plan 41.
      - name: eslint (informational)
        run: npx eslint .
        continue-on-error: true
